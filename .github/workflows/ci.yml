name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          DEMO_MODE: '1'
          SESSION_SECRET: 'ci-only-secret-change-me'
          APP_URL: 'http://localhost:3000'
      - name: Install Playwright
        run: npm run test:e2e:install
      - name: Run E2E
        run: npm run test:e2e
        env:
          DEMO_MODE: '1'
